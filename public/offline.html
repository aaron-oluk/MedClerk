<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MedClerk, offline</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #f3f4f6;
                color: #111827;
                text-align: center;
                padding: 24px;
            }
            h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
            p { color: #6b7280; max-width: 24rem; }
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                background: #0f172a;
                color: white;
                padding: 0.5rem 1rem;
                border-radius: 0.5rem;
                font-weight: 600;
                margin-bottom: 1.5rem;
            }
            a {
                margin-top: 1.5rem;
                color: #0d9488;
                font-weight: 600;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="badge">MedClerk</div>
        <h1>You are offline</h1>
        <p>
            This page has not been saved for offline use. Clinical library pages and the
            quick logbook capture form remain available once you have opened them at least
            once while connected. Anything you log offline will sync automatically when
            your connection returns.
        </p>
        <a href="/dashboard">Try again</a>
    </body>
</html>
