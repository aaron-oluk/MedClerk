<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;}</style></head>
<body>
<iframe id="f" src="about:blank" style="width:1280px;height:900px;border:0;display:block;"></iframe>
<script>
var params = new URLSearchParams(location.search);
var email = params.get('email') || 'student@medclerk.test';
var path = params.get('path') || '/logbook-entries';
fetch('/login').then(r => r.text()).then(html => {
    var token = html.match(/name="_token" value="([^"]*)"/)[1];
    var body = new URLSearchParams({ _token: token, email: email, password: 'password' });
    return fetch('/login', { method: 'POST', body, headers: {'Content-Type':'application/x-www-form-urlencoded'} });
}).then(() => {
    document.getElementById('f').src = path;
});
</script>
</body>
</html>
